<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBlock | Top Rankings</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profiles.css"> <style>
        .tops-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 50px;
        }
        .top-column {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .top-column h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .rank-list { list-style: none; padding: 0; }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .rank-item:last-child { border: none; }
        .coming-soon {
            text-align: center;
            color: #666;
            margin-top: 50px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <main class="container">
        <h1 style="text-align: center; margin-top: 40px;">Hall da Fama</h1>
        
        <div class="tops-grid">
            <div class="top-column">
                <h2>🏆 Top Nível</h2>
                <ul id="top-level-list" class="rank-list">
                    <div class="loader">Carregando...</div>
                </ul>
            </div>

            <div class="top-column">
                <h2>💰 Em Breve</h2>
                <p class="coming-soon">Ranking de Ricassos...</p>
            </div>

            <div class="top-column">
                <h2>⚔️ Em Breve</h2>
                <p class="coming-soon">Ranking de Slayer...</p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script>
        const API_BASE = window.location.hostname === "localhost" ? "http://localhost:8080" : "https://skyblock-stats.onrender.com";

        async function loadTops() {
            try {
                const res = await fetch(`${API_BASE}/top`);
                const data = await res.json();
                const list = document.getElementById('top-level-list');
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<p class="coming-soon">Ninguém registrado.</p>';
                    return;
                }

                list.innerHTML = data.map((p, i) => `
                    <li class="rank-item">
                        <span>#${i+1} <b><a href="profiles.html?user=${encodeURIComponent(p.username)}" class="top-username-link">${p.username}</a></b></span>
                        <span style="color: var(--gold)">Lvl ${p.level}</span>
                    </li>
                `).join('');
            } catch (e) {
                document.getElementById('top-level-list').innerHTML = '<p style="color:red">Erro ao carregar.</p>';
            }
        }
        loadTops();
    </script>
</body>
</html>
